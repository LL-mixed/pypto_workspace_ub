# Extended topology format with UBC capabilities

[node "nodeA"]
device_id=nodeA.ubcdev0
entity_count=2
primary_fe_type=mue
secondary_fe_type=ue

[node "nodeB"]
device_id=nodeB.ubcdev0
entity_count=2
primary_fe_type=mue
secondary_fe_type=ue

[link "nodeA-nodeB-direct"]
a_device_id=nodeA.ubcdev0
a_port_idx=1
b_device_id=nodeB.ubcdev0
b_port_idx=1
link_up=true
