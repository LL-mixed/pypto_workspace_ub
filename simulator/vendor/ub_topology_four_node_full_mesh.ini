# Extended topology format with UBC capabilities
# Four-node full mesh using all 3 ports on each UBC.

[node "nodeA"]
device_id=nodeA.ubcdev0
entity_count=2
primary_fe_type=mue
secondary_fe_type=ue

[node "nodeB"]
device_id=nodeB.ubcdev0
entity_count=2
primary_fe_type=mue
secondary_fe_type=ue

[node "nodeC"]
device_id=nodeC.ubcdev0
entity_count=2
primary_fe_type=mue
secondary_fe_type=ue

[node "nodeD"]
device_id=nodeD.ubcdev0
entity_count=2
primary_fe_type=mue
secondary_fe_type=ue

[link "nodeA-nodeB"]
a_device_id=nodeA.ubcdev0
a_port_idx=0
b_device_id=nodeB.ubcdev0
b_port_idx=0
link_up=true

[link "nodeA-nodeC"]
a_device_id=nodeA.ubcdev0
a_port_idx=1
b_device_id=nodeC.ubcdev0
b_port_idx=0
link_up=true

[link "nodeA-nodeD"]
a_device_id=nodeA.ubcdev0
a_port_idx=2
b_device_id=nodeD.ubcdev0
b_port_idx=0
link_up=true

[link "nodeB-nodeC"]
a_device_id=nodeB.ubcdev0
a_port_idx=1
b_device_id=nodeC.ubcdev0
b_port_idx=1
link_up=true

[link "nodeB-nodeD"]
a_device_id=nodeB.ubcdev0
a_port_idx=2
b_device_id=nodeD.ubcdev0
b_port_idx=1
link_up=true

[link "nodeC-nodeD"]
a_device_id=nodeC.ubcdev0
a_port_idx=2
b_device_id=nodeD.ubcdev0
b_port_idx=2
link_up=true
